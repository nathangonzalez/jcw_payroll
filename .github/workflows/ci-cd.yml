name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22 and npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: labor-timekeeper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: labor-timekeeper

      - name: Start webserver (smoke)
        run: |
          nohup npm start > server.log 2>&1 &
          echo $! > webserver.pid
          status=0
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
            if [ "$status" = "200" ]; then
              echo "webserver up"
              break
            fi
            sleep 1
          done
          if [ "$status" != "200" ]; then
            cat server.log || true
            exit 1
          fi
        working-directory: labor-timekeeper

      - name: Seed test data
        run: |
          curl -s -X POST http://localhost:3000/api/admin/seed
        working-directory: labor-timekeeper

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: labor-timekeeper

      - name: Run CI smoke tests
        run: npx playwright test tests/ci-smoke.spec.cjs --project=chromium --workers=1
        working-directory: labor-timekeeper

      - name: Stop webserver
        if: always()
        run: |
          if [ -f labor-timekeeper/webserver.pid ]; then kill $(cat labor-timekeeper/webserver.pid) || true; fi

  deploy-patch:
    name: Deploy Patch (no promote)
    needs: build-and-test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY_B64 }}
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      patch_url: ${{ steps.patch_url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode GCP key from base64
        id: gcp_key
        run: |
          {
            echo "json<<EOF"
            printf '%s' "$GCP_SA_KEY_B64" | tr -d '\r' | base64 --decode
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY_B64 }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ steps.gcp_key.outputs.json }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set patch version
        id: set_version
        run: echo "version=p${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Deploy App Engine patch (no promote)
        run: |
          gcloud app deploy labor-timekeeper/app.yaml --quiet --no-promote --version "${{ steps.set_version.outputs.version }}"

      - name: Build patch URL
        id: patch_url
        run: |
          echo "url=https://${{ steps.set_version.outputs.version }}-dot-labor-timekeeper-dot-jcw-2-android-estimator.uc.r.appspot.com" >> $GITHUB_OUTPUT

      - name: Patch URL
        run: echo "${{ steps.patch_url.outputs.url }}"

  uat-demo-patch:
    name: UAT Demo (Patch URL)
    needs: deploy-patch
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
      UAT_DEMO: "1"
      UAT_WEEK_START: "2026-02-25"
      BASE_URL: https://p${{ github.run_id }}-dot-labor-timekeeper-dot-jcw-2-android-estimator.uc.r.appspot.com
      ADMIN_SECRET_UAT: ${{ secrets.ADMIN_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22 and npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: labor-timekeeper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: labor-timekeeper

      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: labor-timekeeper

      - name: Run UAT demo spec
        run: npx playwright test tests/uat-admin-decouple.spec.cjs --project=chromium --workers=1
        working-directory: labor-timekeeper

      - name: Upload UAT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uat-demo-${{ github.run_id }}
          path: |
            labor-timekeeper/playwright-report/
            labor-timekeeper/test-results/
          retention-days: 14

  uat-approval:
    name: UAT Approval Gate
    needs: uat-demo-patch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: uat-approval
    steps:
      - name: Gate passed
        run: echo "UAT demo reviewed and approved."

  promote:
    name: Promote Patch to Prod
    needs: [deploy-patch, uat-approval]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode GCP key from base64
        id: gcp_key
        run: |
          {
            echo "json<<EOF"
            printf '%s' "$GCP_SA_KEY_B64" | tr -d '\r' | base64 --decode
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY_B64 }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ steps.gcp_key.outputs.json }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Promote patch to prod
        run: |
          gcloud app services set-traffic labor-timekeeper --splits "${{ needs.deploy-patch.outputs.version }}=1"
