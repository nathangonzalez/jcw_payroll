name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: "Set true to allow production deploy in this manual run"
        required: false
        default: "false"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22 and npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: labor-timekeeper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: labor-timekeeper

      - name: Start webserver (smoke)
        run: |
          nohup npm start > server.log 2>&1 &
          echo $! > webserver.pid
          status=0
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
            if [ "$status" = "200" ]; then
              echo "webserver up"
              break
            fi
            sleep 1
          done
          if [ "$status" != "200" ]; then
            cat server.log || true
            exit 1
          fi
        working-directory: labor-timekeeper

      - name: Seed test data
        run: curl -s -X POST http://localhost:3000/api/admin/seed
        working-directory: labor-timekeeper

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: labor-timekeeper

      - name: Run CI smoke tests
        run: npx playwright test tests/ci-smoke.spec.cjs --project=chromium --workers=1
        working-directory: labor-timekeeper

      - name: Stop webserver
        if: always()
        run: |
          if [ -f labor-timekeeper/webserver.pid ]; then
            kill "$(cat labor-timekeeper/webserver.pid)" || true
          fi

  deploy-staging:
    name: Deploy to VM Staging (1:1 runtime)
    needs: build-and-test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Deploy commit to staging service (local runner)
        env:
          SERVICE_USER: ${{ secrets.VM_SERVICE_USER }}
          PROD_REPO: ${{ secrets.VM_DEPLOY_PATH }}
          STAGING_REPO: ${{ secrets.VM_STAGING_DEPLOY_PATH }}
          STAGING_SERVICE: ${{ secrets.VM_STAGING_SERVICE_NAME }}
          STAGING_PORT: ${{ secrets.VM_STAGING_PORT }}
          STAGING_ADMIN_SECRET: ${{ secrets.STAGING_ADMIN_SECRET }}
        run: |
          set -euo pipefail

          SHA="${{ github.sha }}"
          SERVICE_USER="${SERVICE_USER:-nathan}"
          SERVICE_GROUP="$(id -gn "$SERVICE_USER" 2>/dev/null || echo "$SERVICE_USER")"
          PROD_REPO="${PROD_REPO:-/home/${SERVICE_USER}/dev/repos/jcw_payroll}"
          STAGING_REPO="${STAGING_REPO:-/home/${SERVICE_USER}/dev/repos/jcw_payroll-staging}"
          STAGING_SERVICE="${STAGING_SERVICE:-labor-timekeeper-staging}"
          STAGING_PORT="${STAGING_PORT:-18080}"
          STAGING_ADMIN_SECRET="${STAGING_ADMIN_SECRET:-demo}"

          if ! sudo test -d "$PROD_REPO/.git"; then
            echo "Prod repo not found at $PROD_REPO"
            exit 1
          fi

          sudo -u "$SERVICE_USER" bash -lc "set -euo pipefail; cd '$PROD_REPO'; git fetch origin --prune; if ! git cat-file -e '${SHA}^{commit}' 2>/dev/null; then echo 'Commit ${SHA} not found in repo after fetch'; exit 1; fi; if [ ! -e '$STAGING_REPO/.git' ]; then mkdir -p \"$(dirname "$STAGING_REPO")\"; git worktree add --force '$STAGING_REPO' '${SHA}'; else cd '$STAGING_REPO'; git fetch origin --prune; git checkout --force '${SHA}'; fi"

          STAGING_APP_DIR="$STAGING_REPO/labor-timekeeper"
          STAGING_DATA_DIR="$STAGING_APP_DIR/data/staging"
          STAGING_ENV_FILE="$STAGING_APP_DIR/.env.staging"
          sudo -u "$SERVICE_USER" mkdir -p "$STAGING_DATA_DIR"

          if ! sudo test -f "$STAGING_ENV_FILE"; then
            sudo -u "$SERVICE_USER" bash -lc "printf '%s\n' 'NODE_ENV=staging' 'PORT=${STAGING_PORT}' 'DATABASE_PATH=${STAGING_DATA_DIR}/app.db' 'BIND_HOST=127.0.0.1' 'ADMIN_SECRET=${STAGING_ADMIN_SECRET}' 'SKIP_CLOUD_RESTORE=1' 'DISABLE_SCHEDULED_BACKUPS=1' > '$STAGING_ENV_FILE'"
          fi

          upsert_env() {
            key="$1"
            value="$2"
            if sudo grep -q "^${key}=" "$STAGING_ENV_FILE"; then
              sudo sed -i "s#^${key}=.*#${key}=${value}#" "$STAGING_ENV_FILE"
            else
              echo "${key}=${value}" | sudo tee -a "$STAGING_ENV_FILE" >/dev/null
            fi
          }

          upsert_env NODE_ENV staging
          upsert_env PORT "$STAGING_PORT"
          upsert_env DATABASE_PATH "${STAGING_DATA_DIR}/app.db"
          upsert_env BIND_HOST 127.0.0.1
          upsert_env ADMIN_SECRET "$STAGING_ADMIN_SECRET"
          upsert_env SKIP_CLOUD_RESTORE 1
          upsert_env DISABLE_SCHEDULED_BACKUPS 1

          cat <<EOF | sudo tee "/etc/systemd/system/${STAGING_SERVICE}.service" >/dev/null
          [Unit]
          Description=JCW Labor Timekeeper Staging
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=${SERVICE_USER}
          Group=${SERVICE_GROUP}
          WorkingDirectory=${STAGING_APP_DIR}
          EnvironmentFile=${STAGING_ENV_FILE}
          ExecStart=/usr/bin/node server.js
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=${STAGING_SERVICE}
          NoNewPrivileges=true
          ProtectSystem=strict
          ReadWritePaths=${STAGING_DATA_DIR}
          ReadWritePaths=/tmp

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo -u "$SERVICE_USER" bash -lc "cd '$STAGING_APP_DIR' && npm ci --omit=dev"
          sudo systemctl daemon-reload
          sudo systemctl enable "$STAGING_SERVICE"
          sudo systemctl restart "$STAGING_SERVICE"
          sleep 4
          curl -fsS "http://127.0.0.1:${STAGING_PORT}/api/health"

          echo "STAGING_APP_DIR=$STAGING_APP_DIR" >> "$GITHUB_ENV"
          echo "STAGING_PORT=$STAGING_PORT" >> "$GITHUB_ENV"
          echo "STAGING_ADMIN_SECRET=$STAGING_ADMIN_SECRET" >> "$GITHUB_ENV"

  uat-demo:
    name: UAT Demo (VM Staging Local)
    needs: deploy-staging
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64]
    env:
      HUSKY: "0"
      UAT_DEMO: "1"
      UAT_WEEK_START: "2026-02-25"
      SERVICE_USER: ${{ secrets.VM_SERVICE_USER }}
      STAGING_REPO: ${{ secrets.VM_STAGING_DEPLOY_PATH }}
      STAGING_PORT: ${{ secrets.VM_STAGING_PORT }}
      STAGING_ADMIN_SECRET: ${{ secrets.STAGING_ADMIN_SECRET }}
    steps:
      - name: Wait for staging health
        run: |
          SERVICE_USER="${SERVICE_USER:-nathan}"
          STAGING_REPO="${STAGING_REPO:-/home/${SERVICE_USER}/dev/repos/jcw_payroll-staging}"
          STAGING_PORT="${STAGING_PORT:-18080}"
          BASE_URL="http://127.0.0.1:${STAGING_PORT}"
          echo "STAGING_APP_DIR=${STAGING_REPO}/labor-timekeeper" >> "$GITHUB_ENV"
          echo "BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
          echo "ADMIN_SECRET_UAT=${STAGING_ADMIN_SECRET:-demo}" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -fsS "${BASE_URL}/api/health" > /tmp/staging-health.json; then
              cat /tmp/staging-health.json
              exit 0
            fi
            sleep 3
          done
          echo "Staging health check failed"
          exit 1

      - name: Install Playwright on staging app
        run: |
          cd "$STAGING_APP_DIR"
          npm ci
          npx playwright install --with-deps chromium

      - name: Seed staging UAT data
        run: |
          curl -fsS -X POST -H "x-admin-secret: ${ADMIN_SECRET_UAT}" "${BASE_URL}/api/admin/seed"
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -H "x-admin-secret: ${ADMIN_SECRET_UAT}" \
            -d "{\"week_start\":\"${UAT_WEEK_START}\",\"reset\":true,\"submit\":true,\"approve\":true}" \
            "${BASE_URL}/api/admin/simulate-week"

      - name: Run UAT demo spec
        run: |
          cd "$STAGING_APP_DIR"
          npx playwright test tests/uat-admin-decouple.spec.cjs --project=chromium --workers=1

      - name: Upload UAT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uat-demo-${{ github.run_id }}
          path: |
            ${{ env.STAGING_APP_DIR }}/playwright-report/
            ${{ env.STAGING_APP_DIR }}/test-results/
          retention-days: 14

  uat-approval:
    name: UAT Approval Gate
    needs: uat-demo
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: uat-approval
    steps:
      - name: Gate passed
        run: echo "UAT demo reviewed and approved."

  promote:
    name: Deploy to VM + Caddy Prod
    needs: uat-approval
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.promote_to_prod == 'true')
    runs-on: [self-hosted, Linux, X64]
    environment: production
    steps:
      - name: Deploy approved commit to production service (local runner)
        env:
          SERVICE_USER: ${{ secrets.VM_SERVICE_USER }}
          DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
          SERVICE_NAME: ${{ secrets.VM_SERVICE_NAME }}
          LOCAL_HEALTH_URL: ${{ secrets.VM_LOCAL_HEALTH_URL }}
        run: |
          set -euo pipefail

          SHA="${{ github.sha }}"
          SERVICE_USER="${SERVICE_USER:-nathan}"
          DEPLOY_PATH="${DEPLOY_PATH:-/home/${SERVICE_USER}/dev/repos/jcw_payroll}"
          SERVICE_NAME="${SERVICE_NAME:-labor-timekeeper}"
          LOCAL_HEALTH_URL="${LOCAL_HEALTH_URL:-http://127.0.0.1:8080/api/health}"

          sudo -u "$SERVICE_USER" bash -lc "set -euo pipefail; cd '$DEPLOY_PATH'; git fetch origin --prune; if ! git cat-file -e '${SHA}^{commit}' 2>/dev/null; then echo 'Commit ${SHA} not found in repo after fetch'; exit 1; fi; git checkout --force '${SHA}'; cd labor-timekeeper; npm ci --omit=dev"
          sudo systemctl restart "$SERVICE_NAME"
          sleep 5
          curl -fsS "$LOCAL_HEALTH_URL"

          if ! systemctl is-active --quiet caddy; then
            echo "Caddy not active after deploy; attempting one restart"
            sudo systemctl restart caddy || true
            sleep 3
          fi
          if ! systemctl is-active --quiet caddy; then
            echo "ERROR: caddy service is not active"
            sudo systemctl status caddy --no-pager -l || true
            sudo journalctl -u caddy -n 120 --no-pager || true
            exit 1
          fi

          BINDINGS="$(ss -ltn sport = :8080 | awk 'NR>1 {print $4}')"
          echo "Port 8080 bindings: ${BINDINGS}"
          if echo "$BINDINGS" | grep -Eq '(^127\.0\.0\.1:8080$|^\[::1\]:8080$)'; then
            echo "OK: service bound to loopback"
          else
            echo "ERROR: expected loopback-only bind on :8080"
            exit 1
          fi

      - name: Verify public production domain health
        env:
          PROD_HEALTH_URL: ${{ vars.PAYROLL_PROD_HEALTH_URL }}
        run: |
          URL="${PROD_HEALTH_URL:-https://payroll.jcwelton.com/api/health}"
          echo "Checking ${URL}"
          for i in $(seq 1 20); do
            if curl -fsS "$URL" > /tmp/prod-health.json; then
              cat /tmp/prod-health.json
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed for ${URL}"
          exit 1
